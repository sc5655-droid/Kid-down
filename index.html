<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小朋友下樓梯 - 友情破壞版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <style>
        /* --- 響應式 (RWD) 核心設定 --- */
        body {
            margin: 0; padding: 0; 
            background-color: #0b1021; /* 外圍深色背景，適合寬螢幕電腦 */
            color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; /* 使用 dvh 適應手機瀏覽器上下工具列的縮放 */
            width: 100vw; 
            font-family: 'Segoe UI', 'Noto Sans TC', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            touch-action: none; /* ⚠️ 關鍵：防止手機下拉重新整理或手勢干擾 */
        }

        .game-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            max-width: 500px; /* 電腦上限制最大寬度，維持遊戲體驗 */
            background-color: #1a1a2e;
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* --- 頂部 UI --- */
        #gameUI {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; background: #0f3460; 
            padding: 10px; box-sizing: border-box; 
            height: 70px; flex-shrink: 0; /* 防止被擠壓 */
            z-index: 2;
        }
        #gameUI.single-player-ui { justify-content: center; gap: 20px; }
        #gameUI.single-player-ui #p2Display { display: none !important; }

        .p-display { display: flex; align-items: center; width: 42%; transition: opacity 0.3s;}
        .p-dead { opacity: 0.3; } 
        #p2Display { justify-content: flex-end; text-align: right; }

        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); display: flex;
            justify-content: center; align-items: center;
            font-size: 24px; border: 2px solid; flex-shrink: 0;
        }
        #p1Display .avatar { border-color: #2ecc71; margin-right: 10px; }
        #p2Display .avatar { border-color: #3498db; margin-left: 10px; order: 2; }

        .p-info { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        #p2Display .p-info { order: 1; }

        .name { font-weight: bold; font-size: 14px; margin-bottom: 3px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .hp-container {
            width: 100%; height: 8px; background: #1a1a2e;
            border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3);
        }
        .hp-bar { height: 100%; width: 100%; transition: width 0.3s ease-out, background-color 0.3s; }
        .hp-bar-p1 { background-color: #2ecc71; }
        .hp-bar-p2 { background-color: #3498db; }
        .hp-low { background-color: #e74c3c !important; animation: hp-blink 0.5s infinite; }

        @keyframes hp-blink { 50% { opacity: 0.5; } }

        #floorDisplay {
            font-weight: bold; font-size: 24px; color: #f1c40f;
            text-align: center; width: 16%; font-family: 'Arial Black', sans-serif;
        }

        #btnHome {
            position: absolute; top: 80px; right: 10px;
            background: rgba(231, 76, 60, 0.85); color: white;
            border: 2px solid #c0392b; border-radius: 8px;
            padding: 6px 12px; font-size: 14px; font-weight: bold;
            cursor: pointer; z-index: 5; display: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); backdrop-filter: blur(2px);
        }

        /* --- 遊戲畫布 (響應式核心) --- */
        #gameCanvas {
            width: 100%; 
            flex-grow: 1; /* 自動填滿頂部UI與底部按鈕之間的空間 */
            height: 0; /* Flexbox 技巧：讓它完全根據可用空間伸縮 */
            background-color: #16213e; 
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.8);
            object-fit: fill; /* 視覺上拉伸填滿，不改變內部物理座標 */
        }
        
        /* --- 底部控制區 --- */
        #mobileControls {
            display: flex; justify-content: space-between; width: 100%;
            padding: 10px; box-sizing: border-box; gap: 5px;
            background: #0f3460; flex-shrink: 0;
            height: 80px; z-index: 2;
        }
        .touch-btn {
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3);
            color: white; font-size: 24px; border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            user-select: none; cursor: pointer; flex-grow: 1;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.4); }
        .touch-btn-center { font-size: 16px; font-weight: bold; max-width: 80px; }
        .p2-controls { display: none; background: rgba(52, 152, 219, 0.2); border-color: rgba(52, 152, 219, 0.5); color: #3498db;}
        .p1-controls { background: rgba(46, 204, 113, 0.2); border-color: rgba(46, 204, 113, 0.5); color: #2ecc71;}

        /* --- 大廳與彈窗 --- */
        #lobbyUI {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(22, 33, 62, 0.98); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
            overflow-y: auto; /* 手機螢幕太小時允許滾動 */
            padding: 20px 0;
        }
        .lobby-box { background: #0f3460; padding: 20px; border-radius: 10px; text-align: center; width: 85%; max-width: 400px; box-sizing: border-box; position: relative; margin-top: auto; margin-bottom: auto;}
        
        input { 
            padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; 
            border-radius: 5px; border: none; font-size: 18px; text-align: center;
            font-weight: bold;
        }
        #joinCode { letter-spacing: 2px; font-size: 20px; }
        
        button.action-btn {
            background: #e74c3c; color: white; border: none; padding: 12px 15px; width: 100%; box-sizing: border-box;
            border-radius: 5px; font-size: 16px; cursor: pointer; margin-bottom: 8px; transition: 0.2s; font-weight: bold;
        }
        button.action-btn:hover { background: #c0392b; }
        .btn-single { background: #9b59b6 !important; }
        .btn-local { background: #e67e22 !important; }
        .btn-join { background: #2ecc71 !important; }
        #statusText { margin-top: 15px; color: #f1c40f; font-weight: bold; word-break: break-all; font-size: 14px; text-align: center; padding: 0 10px;}
        
        #btnShowLeaderboard {
            position: absolute; top: -15px; right: -10px; background: #f1c40f; color: #1a1a2e;
            border: 2px solid #f39c12; border-radius: 50px; padding: 5px 12px; font-weight: bold;
            font-size: 14px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        #leaderboardModal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 20; flex-direction: column; justify-content: center; align-items: center;
        }
        .leaderboard-content {
            background: #2c3e50; border: 4px solid #f1c40f; border-radius: 10px; width: 85%; max-width: 400px;
            max-height: 70%; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .leaderboard-title { color: #f1c40f; font-size: 22px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .leaderboard-list {
            list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1;
        }
        .leaderboard-item {
            display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 16px; font-weight: bold; color: #ecf0f1;
        }
        .leaderboard-item span.rank { color: #f39c12; width: 30px; }
        .leaderboard-item span.score { color: #2ecc71; }
        #btnCloseLeaderboard {
            margin-top: 15px; background: #e74c3c; color: white; border: none; padding: 10px;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="gameUI" style="display: none;">
            <div class="p-display" id="p1Display">
                <div class="avatar" id="p1Avatar">😎</div>
                <div class="p-info">
                    <div class="name" id="p1Name">玩家 1</div>
                    <div class="hp-container"><div class="hp-bar hp-bar-p1" id="p1HpBar"></div></div>
                </div>
            </div>
            <div id="floorDisplay">B0</div>
            <div class="p-display" id="p2Display">
                <div class="avatar" id="p2Avatar">🤠</div>
                <div class="p-info">
                    <div class="name" id="p2Name">等待中</div>
                    <div class="hp-container"><div class="hp-bar hp-bar-p2" id="p2HpBar"></div></div>
                </div>
            </div>
        </div>

        <button id="btnHome">🚪 退出</button>

        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="mobileControls">
            <div class="touch-btn p2-controls" id="btnA">A</div>
            <div class="touch-btn p2-controls" id="btnD">D</div>
            <div class="touch-btn touch-btn-center" id="btnRestart">重來</div>
            <div class="touch-btn p1-controls" id="btnLeft">⬅️</div>
            <div class="touch-btn p1-controls" id="btnRight">➡️</div>
        </div>

        <div id="leaderboardModal">
            <div class="leaderboard-content">
                <div class="leaderboard-title">🌍 真正的全球英雄榜</div>
                <ul class="leaderboard-list" id="leaderboardList"></ul>
                <button id="btnCloseLeaderboard">關閉</button>
            </div>
        </div>

        <div id="lobbyUI">
            <h1 style="margin-top:0; font-size: 28px; margin-bottom: 10px;">小朋友下樓梯</h1>
            
            <div style="background: rgba(0, 0, 0, 0.3); padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; text-align: left; border: 1px dashed rgba(255, 255, 255, 0.3); width: 85%; max-width: 400px; box-sizing: border-box;">
                <div style="color: #f1c40f; font-weight: bold; font-size: 14px; margin-bottom: 6px; text-align: center;">📖 遊戲說明</div>
                <div id="instructionText" style="color: #ecf0f1; font-size: 13px; line-height: 1.6;">
                    透過左右移動不斷往下跳，避開陷阱地塊！<br>
                    <div style="text-align: center; margin-top: 5px;">
                        <span style="color:#f39c12; font-weight:bold;">點擊下方按鈕可切換困難模式。</span>
                    </div>
                </div>
            </div>

            <div class="lobby-box">
                <button id="btnShowLeaderboard">🏆 英雄榜</button>
                
                <input type="text" id="playerNameInput" placeholder="請輸入你的暱稱 (紀錄用)" maxlength="10">

                <button id="btnToggleHard" style="background: #34495e; color: white; border: 2px solid #7f8c8d; padding: 10px; width: 100%; border-radius: 5px; font-size: 16px; cursor: pointer; margin-bottom: 15px; font-weight: bold; transition: 0.3s; box-sizing: border-box;">
                    🟢 模式：普通 (點擊切換困難)
                </button>

                <button class="action-btn btn-single" id="btnSingle">🕹️ 單機遊戲 (1P)</button>
                <button class="action-btn btn-local" id="btnLocal">👯 雙人同機 (2P Local)</button>
                <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
                <p style="font-size: 14px; margin: 0 0 10px 0; color: #bdc3c7; font-weight: bold;">連線派對模式 (2P Online)</p>
                <button class="action-btn" id="btnCreate">👑 建立房間 (Host)</button>
                <input type="tel" id="joinCode" placeholder="輸入 4 位數代碼" maxlength="4" style="margin-top: 5px;">
                <button class="action-btn btn-join" id="btnJoin">🚀 加入房間 (Client)</button>
            </div>
            <p id="statusText">準備就緒！請輸入暱稱並選擇模式。</p>
        </div>
    </div>

    <script>
        // --- 真正的全球排行榜系統 (Firebase) ---
        const modalLeaderboard = document.getElementById('leaderboardModal');
        const listLeaderboard = document.getElementById('leaderboardList');

        // 保留你的 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyBraFSgvOerlQtwdcf9zGL6g3XRed6jMRk",
            authDomain: "index-21a30.firebaseapp.com",
            databaseURL: "https://index-21a30-default-rtdb.firebaseio.com",
            projectId: "index-21a30",
            storageBucket: "index-21a30.firebasestorage.app",
            messagingSenderId: "574499643111",
            appId: "1:574499643111:web:6cc064455fa01b5b6f8c42",
            measurementId: "G-VC9J5FFXQ7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveScoreToLeaderboard(name, score, modeStr) {
            if (score <= 0) return; 
            db.ref('global_leaderboard').push({
                name: name || '無名英雄', score: score, mode: modeStr, date: new Date().toLocaleDateString()
            }).catch(error => console.error("分數上傳失敗：", error));
        }

        document.getElementById('btnShowLeaderboard').onclick = () => {
            modalLeaderboard.style.display = 'flex';
            listLeaderboard.innerHTML = '<div style="text-align:center; color:#f1c40f; margin-top: 20px;">📡 正在連接全球衛星獲取排名...</div>';
            
            db.ref('global_leaderboard').orderByChild('score').limitToLast(10).once('value', (snapshot) => {
                let scores = [];
                snapshot.forEach((childSnapshot) => { scores.push(childSnapshot.val()); });
                scores.reverse();
                listLeaderboard.innerHTML = '';
                
                if (scores.length === 0) {
                    listLeaderboard.innerHTML = '<div style="text-align:center; color:#bdc3c7; margin-top: 20px;">目前還沒有人上榜喔！<br>快去挑戰吧！</div>';
                } else {
                    scores.forEach((entry, index) => {
                        const li = document.createElement('li');
                        li.className = 'leaderboard-item';
                        const rankEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}.`;
                        li.innerHTML = `
                            <div style="display:flex; align-items:center;">
                                <span class="rank">${rankEmoji}</span>
                                <span style="max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${entry.name}</span>
                                <span style="font-size:10px; color:#7f8c8d; margin-left:5px;">(${entry.mode})</span>
                            </div>
                            <span class="score">B${entry.score}</span>
                        `;
                        listLeaderboard.appendChild(li);
                    });
                }
            }).catch((error) => {
                listLeaderboard.innerHTML = `<div style="text-align:center; color:#e74c3c; margin-top: 20px;">讀取失敗 🥲<br>請確認 Firebase 資料庫權限。</div>`;
                console.error("Firebase 讀取錯誤:", error);
            });
        };

        document.getElementById('btnCloseLeaderboard').onclick = () => modalLeaderboard.style.display = 'none';

        // --- 遊戲邏輯 ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiContainer = document.getElementById('gameUI');
        const btnHome = document.getElementById('btnHome');
        const uiLobby = document.getElementById('lobbyUI');
        const statusText = document.getElementById('statusText');
        const joinCodeInput = document.getElementById('joinCode');
        const playerNameInput = document.getElementById('playerNameInput');
        const btnToggleHard = document.getElementById('btnToggleHard');
        const instructionText = document.getElementById('instructionText');

        const savedName = localStorage.getItem('kidDownstair_playerName');
        if (savedName) playerNameInput.value = savedName;

        playerNameInput.addEventListener('change', (e) => {
            localStorage.setItem('kidDownstair_playerName', e.target.value.trim());
        });

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isAudioInitialized = false;
        function playSound(type) {
            if (!isAudioInitialized || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            if (type === 'heal') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            } else if (type === 'hurt') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            }
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        const GAME_PREFIX = 'kid-downstair-v2-'; 
        let peer = null; let conn = null; 
        let currentMode = 'single'; 
        let isHardMode = false; 
        
        btnToggleHard.onclick = () => {
            isHardMode = !isHardMode;
            if (isHardMode) {
                btnToggleHard.innerHTML = '🔥 模式：困難 (有道具與新陷阱)';
                btnToggleHard.style.background = '#8e44ad';
                btnToggleHard.style.borderColor = '#9b59b6';
                instructionText.innerHTML = `
                    <span style="color:#e74c3c; font-weight:bold;">【困難模式啟動】新增以下元素：</span><br>
                    🟣 <b>彈簧床</b>：一踩就起飛，小心撞到天花板扣血！<br>
                    🟤 <b>泥沼地</b>：移動速度大減，很難躲避陷阱。<br>
                    ❤️ <b>回復藥水</b>：隨機出現，吃到補 3 滴血。<br>
                    ☠️ <b>致命毒藥</b>：偽裝成道具，吃到扣 3 滴血。
                `;
            } else {
                btnToggleHard.innerHTML = '🟢 模式：普通 (點擊切換困難)';
                btnToggleHard.style.background = '#34495e';
                btnToggleHard.style.borderColor = '#7f8c8d';
                instructionText.innerHTML = `
                    透過左右移動不斷往下跳，避開陷阱地塊！<br>
                    <div style="text-align: center; margin-top: 5px;">
                        <span style="color:#f39c12; font-weight:bold;">點擊下方按鈕可切換困難模式。</span>
                    </div>
                `;
            }
        };

        function createPlayer(sprite, color, startX) {
            return {
                sprite: sprite, color: color, x: startX, y: 100, width: 24, height: 32,
                vx: 0, vy: 0, speed: 6, currentSpeed: 6, gravity: 0.6, maxHp: 10, hp: 10, 
                invulnerableFrames: 0, isDead: false, lastHealedId: -1, lastHurtId: -1
            };
        }
        let p1 = createPlayer('😎', '#2ecc71', 250); 
        let p2 = createPlayer('🤠', '#3498db', 150); 

        function returnToLobby() {
            gameState = STATE_WAITING; 
            if (conn) { conn.close(); conn = null; }
            if (peer) { peer.destroy(); peer = null; }
            
            uiContainer.style.display = 'none';
            btnHome.style.display = 'none';
            uiLobby.style.display = 'flex';
            statusText.innerText = "已返回大廳！請選擇遊戲模式。";
            
            document.querySelectorAll('.p2-controls').forEach(el => el.style.display = 'none');
            ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, canvas.width, canvas.height); 
        }

        btnHome.onclick = () => { if(confirm("確定要結束當前遊戲，返回大廳嗎？")) returnToLobby(); };

        function setUIConfig(mode) {
            uiContainer.style.display = 'flex';
            uiContainer.className = ''; 
            document.getElementById('p1Display').classList.remove('p-dead');
            document.getElementById('p2Display').classList.remove('p-dead');

            const p1CustomName = playerNameInput.value.trim() || '玩家 1';

            if (mode === 'single') {
                uiContainer.classList.add('single-player-ui');
                document.getElementById('p1Name').innerText = p1CustomName;
                document.querySelectorAll('.p2-controls').forEach(el => el.style.display = 'none');
            } else if (mode === 'local') {
                document.getElementById('p1Name').innerText = p1CustomName + ' (P1)';
                document.getElementById('p2Name').innerText = 'P2 (A與D鍵)';
                document.getElementById('p2Avatar').innerText = p2.sprite;
                document.querySelectorAll('.p2-controls').forEach(el => el.style.display = 'flex');
            } else if (mode === 'online_host') {
                document.getElementById('p1Name').innerText = p1CustomName + ' (房主)';
                document.getElementById('p2Name').innerText = '連線中...';
                document.getElementById('p2Avatar').innerText = '❓';
                document.querySelectorAll('.p2-controls').forEach(el => el.style.display = 'none');
            } else if (mode === 'online_client') {
                document.getElementById('p1Name').innerText = p1CustomName + ' (客人)';
                document.getElementById('p2Name').innerText = '房主 (對手)';
                document.getElementById('p2Avatar').innerText = '😎'; 
                document.querySelectorAll('.p2-controls').forEach(el => el.style.display = 'none');
            }
        }

        document.getElementById('btnSingle').onclick = () => {
            currentMode = 'single'; setUIConfig('single'); uiLobby.style.display = 'none'; 
            if (!isAudioInitialized) { audioCtx.resume(); isAudioInitialized = true; }
            startGame();
        };

        document.getElementById('btnLocal').onclick = () => {
            currentMode = 'local'; setUIConfig('local'); uiLobby.style.display = 'none'; 
            if (!isAudioInitialized) { audioCtx.resume(); isAudioInitialized = true; }
            startGame();
        };

        document.getElementById('btnCreate').onclick = () => {
            currentMode = 'online_host'; setUIConfig('online_host');
            statusText.innerText = "正在產生房間代碼...";
            const roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer(GAME_PREFIX + roomCode); 

            peer.on('open', (id) => { 
                statusText.innerHTML = `請朋友輸入 4 位數代碼：<br><br><span style="background:#fff; color:#e74c3c; padding:5px 15px; border-radius:5px; user-select:all; font-family:monospace; font-size: 28px; font-weight: bold; letter-spacing: 2px;">${roomCode}</span><br><br>等待加入中...`;
            });
            peer.on('connection', (connection) => { 
                if (gameState !== STATE_WAITING) return; 
                conn = connection; 
                conn.on('open', () => { setupConnectionEvent(); });
            });
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') { statusText.innerText = "代碼衝突，請重試！"; if (peer) peer.destroy(); }
            });
        };

        document.getElementById('btnJoin').onclick = () => {
            const code = joinCodeInput.value.trim();
            if (!code || code.length !== 4 || isNaN(code)) { alert("請輸入正確的 4 位數代碼！"); return; }
            currentMode = 'online_client'; 
            p1 = createPlayer('🤠', '#3498db', 200); 
            p2 = createPlayer('😎', '#2ecc71', 200); 
            setUIConfig('online_client');
            statusText.innerText = "連線中，請稍候...";
            peer = new Peer();
            peer.on('open', () => { 
                conn = peer.connect(GAME_PREFIX + code);
                conn.on('open', () => { setupConnectionEvent(); });
            });
            peer.on('error', () => { statusText.innerText = "連線失敗！"; if (peer) peer.destroy(); });
        };

        function setupConnectionEvent() {
            if (!isAudioInitialized) { audioCtx.resume(); isAudioInitialized = true; }
            uiLobby.style.display = 'none'; 

            conn.on('data', (data) => {
                if (data.type === 'clientReady' && currentMode === 'online_host') { startGame(); }
                if (data.type === 'initGame') { 
                    startGame(); platforms = data.platforms; platformSpeed = data.speed;
                    if (platforms.length > 0) {
                        p1.x = platforms[0].x + 40; p1.y = platforms[0].y - 32;
                        p2.x = platforms[0].x; p2.y = platforms[0].y - 32;
                    }
                }
                if (data.type === 'syncPlatforms') { platforms = data.platforms; platformSpeed = data.speed; floorCount = data.floorCount; }
                if (data.type === 'syncPlayer') { Object.assign(p2, data.player); } 
                if (data.type === 'gameOver') { triggerGameOver(); }
            });

            conn.on('close', () => { if (gameState !== STATE_WAITING) { alert("對方已斷線！"); returnToLobby(); } });
            
            if (currentMode === 'online_host') {
                document.getElementById('p2Name').innerText = '客人 (對手)'; 
                document.getElementById('p2Avatar').innerText = '🤠';
                setUIConfig('online_host');
                ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
                ctx.fillText('等待對手準備中...', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left'; 
            } else {
                setUIConfig('online_client');
                ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
                ctx.fillText('連線成功！等待房主載入地形...', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left'; 
                setTimeout(() => { conn.send({ type: 'clientReady' }); }, 500);
            }
        }

        const STATE_WAITING = 0; const STATE_PLAYING = 1; const STATE_GAMEOVER = 2;
        let gameState = STATE_WAITING;
        let platforms = []; let floorCount = 0; let platformSpeed = 2.0; let platformSpawnRate = 60; let spawnTimer = 0; let platformIdCounter = 0; 
        let syncCounter = 0; let hasSavedScore = false; 
        
        const BASE_SPEED = 2.0; const MAX_SPEED = 6.5; const PLATFORM_GAP = 120;
        const TYPES = { NORMAL: 0, SPIKE: 1, CONVEYOR_LEFT: 2, CONVEYOR_RIGHT: 3, FAKE: 4, TRAMPOLINE: 5, MUD: 6 };
        const ITEMS = { NONE: 0, POTION: 1, POISON: 2 };

        const keys = { ArrowLeft: false, ArrowRight: false, KeyA: false, KeyD: false, Space: false };

        function handleInput(code, isDown, e) {
            if (e && e.cancelable) e.preventDefault(); 
            if (keys.hasOwnProperty(code)) keys[code] = isDown;
            if (!isAudioInitialized) { audioCtx.resume(); isAudioInitialized = true; }
            
            if (code === 'Space' && isDown && gameState === STATE_GAMEOVER) {
                if (currentMode === 'online_host' || currentMode === 'single' || currentMode === 'local') {
                    startGame(); 
                }
            }
        }
        window.addEventListener('keydown', (e) => handleInput(e.code, true, null));
        window.addEventListener('keyup', (e) => handleInput(e.code, false, null));
        
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => handleInput('ArrowLeft', true, e));
        document.getElementById('btnLeft').addEventListener('touchend', (e) => handleInput('ArrowLeft', false, e));
        document.getElementById('btnRight').addEventListener('touchstart', (e) => handleInput('ArrowRight', true, e));
        document.getElementById('btnRight').addEventListener('touchend', (e) => handleInput('ArrowRight', false, e));
        document.getElementById('btnA').addEventListener('touchstart', (e) => handleInput('KeyA', true, e));
        document.getElementById('btnA').addEventListener('touchend', (e) => handleInput('KeyA', false, e));
        document.getElementById('btnD').addEventListener('touchstart', (e) => handleInput('KeyD', true, e));
        document.getElementById('btnD').addEventListener('touchend', (e) => handleInput('KeyD', false, e));
        document.getElementById('btnRestart').addEventListener('touchstart', (e) => handleInput('Space', true, e));
        
        function updateDOMUI() {
            document.getElementById('floorDisplay').innerText = `B${floorCount}`;
            document.getElementById('p1HpBar').style.width = (p1.hp / p1.maxHp * 100) + '%';
            if (p1.hp <= 3 && !p1.isDead) document.getElementById('p1HpBar').classList.add('hp-low'); else document.getElementById('p1HpBar').classList.remove('hp-low');
            if (p1.isDead) document.getElementById('p1Display').classList.add('p-dead'); else document.getElementById('p1Display').classList.remove('p-dead');

            if (currentMode !== 'single') {
                document.getElementById('p2HpBar').style.width = (p2.hp / p2.maxHp * 100) + '%';
                if (p2.hp <= 3 && !p2.isDead) document.getElementById('p2HpBar').classList.add('hp-low'); else document.getElementById('p2HpBar').classList.remove('hp-low');
                if (p2.isDead) document.getElementById('p2Display').classList.add('p-dead'); else document.getElementById('p2Display').classList.remove('p-dead');
            }
        }

        function spawnPlatform(yPosition) {
            const xPosition = Math.random() * (canvas.width - 100);
            let rand = Math.random(); let type = TYPES.NORMAL;
            let item = ITEMS.NONE;
            
            if (isHardMode) {
                if (rand > 0.85) type = TYPES.FAKE; 
                else if (rand > 0.65) type = TYPES.SPIKE; 
                else if (rand > 0.55) type = TYPES.CONVEYOR_RIGHT; 
                else if (rand > 0.45) type = TYPES.CONVEYOR_LEFT; 
                else if (rand > 0.30) type = TYPES.TRAMPOLINE;
                else if (rand > 0.15) type = TYPES.MUD;
                
                if ((type === TYPES.NORMAL || type === TYPES.MUD) && Math.random() > 0.7) {
                    item = Math.random() > 0.5 ? ITEMS.POTION : ITEMS.POISON;
                }
            } else {
                if (rand > 0.85) type = TYPES.FAKE; else if (rand > 0.75) type = TYPES.CONVEYOR_RIGHT; else if (rand > 0.65) type = TYPES.CONVEYOR_LEFT; else if (rand > 0.50) type = TYPES.SPIKE;
            }
            
            platforms.push({ id: platformIdCounter++, x: xPosition, y: yPosition || canvas.height, width: 100, height: 12, type: type, active: true, stepTimer: 0, item: item });
        }

        function startGame() {
            floorCount = 0; platformSpeed = BASE_SPEED; platformSpawnRate = Math.floor(PLATFORM_GAP / platformSpeed);
            spawnTimer = 0; platforms = []; platformIdCounter = 0; syncCounter = 0; hasSavedScore = false; 
            
            Object.assign(p1, createPlayer(p1.sprite, p1.color, canvas.width/2 + 20));
            Object.assign(p2, createPlayer(p2.sprite, p2.color, canvas.width/2 - 40));
            
            btnHome.style.display = 'block'; 

            if (currentMode !== 'online_client') {
                for (let i = 1; i <= 5; i++) { spawnPlatform(i * 120); platforms[i-1].type = TYPES.NORMAL; platforms[i-1].item = ITEMS.NONE; }
                p1.x = platforms[0].x + 40; p1.y = platforms[0].y - 32;
                p2.x = platforms[0].x; p2.y = platforms[0].y - 32;
                if (currentMode === 'online_host' && conn) { conn.send({ type: 'initGame', platforms: platforms, speed: platformSpeed }); }
            }
            
            gameState = STATE_PLAYING;
            requestAnimationFrame(update);
        }

        function updatePlayerPhysics(player, leftPressed, rightPressed) {
            if (player.isDead) return;
            if (player.invulnerableFrames > 0) player.invulnerableFrames--;
            if (leftPressed) player.vx = -player.currentSpeed; else if (rightPressed) player.vx = player.currentSpeed; else player.vx = 0;
            
            player.x += player.vx;
            if (player.x + player.width < 0) player.x = canvas.width; if (player.x > canvas.width) player.x = -player.width;
            
            player.vy += player.gravity; player.y += player.vy;
            
            if (player.y <= 15) { 
                if (player.invulnerableFrames <= 0) { player.hp -= 3; player.invulnerableFrames = 40; playSound('hurt'); }
                player.y = 16; player.vy = 2;
            }

            player.currentSpeed = player.speed; 

            for (let i = 0; i < platforms.length; i++) {
                let plt = platforms[i];
                if (plt.active && player.vy >= 0 && player.y + player.height >= plt.y && player.y + player.height <= plt.y + platformSpeed + player.vy + 24 && player.x + player.width > plt.x && player.x < plt.x + plt.width) {
                    
                    player.y = plt.y - player.height; player.vy = 0;

                    if (plt.item !== ITEMS.NONE) {
                        if (plt.item === ITEMS.POTION && plt.id !== player.lastHealedId) {
                            player.hp = Math.min(player.maxHp, player.hp + 3); 
                            playSound('heal'); player.lastHealedId = plt.id; plt.item = ITEMS.NONE; 
                        } else if (plt.item === ITEMS.POISON && plt.id !== player.lastHurtId) {
                            player.hp -= 3; playSound('hurt'); player.invulnerableFrames = 40; player.lastHurtId = plt.id; plt.item = ITEMS.NONE; 
                        }
                    }

                    switch (plt.type) {
                        case TYPES.NORMAL:
                            if (player.hp < player.maxHp && plt.id !== player.lastHealedId) { player.hp++; playSound('heal'); player.lastHealedId = plt.id; }
                            break;
                        case TYPES.SPIKE:
                            if (plt.id !== player.lastHurtId) { player.hp -= 4; playSound('hurt'); player.lastHurtId = plt.id; player.invulnerableFrames = 40; }
                            break;
                        case TYPES.CONVEYOR_LEFT: player.x -= 3; break;
                        case TYPES.CONVEYOR_RIGHT: player.x += 3; break;
                        case TYPES.FAKE: 
                            if (plt.stepTimer === 0) { 
                                plt.stepTimer = 1; 
                                if(currentMode === 'online_host' && conn) conn.send({type: 'syncPlatforms', platforms: platforms, speed: platformSpeed, floorCount: floorCount}); 
                            } 
                            break;
                        case TYPES.TRAMPOLINE: player.vy = -13; playSound('heal'); break;
                        case TYPES.MUD: player.currentSpeed = 1.5; break;
                    }
                }
            }
            if (player.y > canvas.height || player.hp <= 0) { player.isDead = true; player.hp = 0; }
        }

        function triggerGameOver() {
            gameState = STATE_GAMEOVER;
            if (!hasSavedScore) {
                const pName = playerNameInput.value.trim() || '無名英雄';
                const modeStr = isHardMode ? '困難' : '普通';
                saveScoreToLeaderboard(pName, floorCount, modeStr);
                hasSavedScore = true;
            }
        }

        function update() {
            if (gameState !== STATE_PLAYING) return;
            
            if (currentMode !== 'online_client') {
                spawnTimer++;
                if (spawnTimer >= platformSpawnRate) {
                    spawnPlatform(); floorCount++; spawnTimer = 0;
                    platformSpeed = Math.min(MAX_SPEED, BASE_SPEED + (floorCount * 0.05));
                    platformSpawnRate = Math.floor(PLATFORM_GAP / platformSpeed);
                }
                for (let i = 0; i < platforms.length; i++) {
                    let plt = platforms[i]; plt.y -= platformSpeed;
                    if (plt.type === TYPES.FAKE && plt.stepTimer > 0) { plt.stepTimer++; if (plt.stepTimer > 15) plt.active = false; }
                }
                if (platforms.length > 0 && platforms[0].y + 12 < 0) platforms.shift();
            } else {
                for (let i = 0; i < platforms.length; i++) { platforms[i].y -= platformSpeed; }
            }

            updatePlayerPhysics(p1, keys.ArrowLeft, keys.ArrowRight);
            if (currentMode === 'local') { updatePlayerPhysics(p2, keys.KeyA, keys.KeyD); }

            syncCounter++;
            if (currentMode === 'online_host' && conn) {
                if (syncCounter % 4 === 0) { conn.send({ type: 'syncPlatforms', platforms: platforms, speed: platformSpeed, floorCount: floorCount }); }
            }
            
            if ((currentMode === 'online_host' || currentMode === 'online_client') && conn) {
                if (syncCounter % 2 === 0) { conn.send({ type: 'syncPlayer', player: p1 }); }
            }

            if (currentMode === 'single') { if (p1.isDead) triggerGameOver(); }
            else if (currentMode === 'local') { if (p1.isDead && p2.isDead) triggerGameOver(); }
            else if (currentMode === 'online_host') {
                if (p1.isDead && p2.isDead) { triggerGameOver(); if(conn) conn.send({ type: 'gameOver' }); }
            }
            
            updateDOMUI(); draw(); requestAnimationFrame(update);
        }

        function drawCharacter(player) {
            if (player.isDead) return;
            if (player.invulnerableFrames > 0 && Math.floor(Date.now() / 100) % 2 === 0) return; 
            ctx.fillStyle = player.color;
            ctx.font = '30px Arial'; ctx.textAlign = 'center'; 
            ctx.fillText(player.sprite, player.x + 12, player.y + 26); 
            ctx.textAlign = 'left';
        }

        function draw() {
            ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#e74c3c';
            for (let i = 0; i < canvas.width; i += 20) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + 10, 15); ctx.lineTo(i + 20, 0); ctx.fill(); }
            
            platforms.forEach(plt => {
                if (!plt.active) return; 
                if (plt.type === TYPES.NORMAL) { ctx.fillStyle = '#2ecc71'; ctx.fillRect(plt.x, plt.y, plt.width, plt.height); }
                else if (plt.type === TYPES.SPIKE) {
                    ctx.fillStyle = '#e74c3c'; ctx.fillRect(plt.x, plt.y + 5, plt.width, plt.height - 5);
                    for (let i = plt.x; i < plt.x + plt.width; i += 10) { ctx.beginPath(); ctx.moveTo(i, plt.y + 5); ctx.lineTo(i + 5, plt.y - 5); ctx.lineTo(i + 10, plt.y + 5); ctx.fill(); }
                }
                else if (plt.type === TYPES.CONVEYOR_LEFT) { ctx.fillStyle = '#3498db'; ctx.fillRect(plt.x, plt.y, plt.width, plt.height); ctx.fillStyle = 'white'; ctx.fillText('⏪ ⏪', plt.x + 20, plt.y + 10); }
                else if (plt.type === TYPES.CONVEYOR_RIGHT) { ctx.fillStyle = '#3498db'; ctx.fillRect(plt.x, plt.y, plt.width, plt.height); ctx.fillStyle = 'white'; ctx.fillText('⏩ ⏩', plt.x + 20, plt.y + 10); }
                else if (plt.type === TYPES.FAKE) { ctx.fillStyle = plt.stepTimer > 0 ? '#d7ccc8' : '#8d6e63'; ctx.fillRect(plt.x, plt.y, plt.width, plt.height); }
                else if (plt.type === TYPES.TRAMPOLINE) { 
                    ctx.fillStyle = '#9b59b6'; ctx.fillRect(plt.x, plt.y, plt.width, plt.height);
                    ctx.fillStyle = '#e0b0ff'; ctx.fillRect(plt.x, plt.y, plt.width, 4); 
                }
                else if (plt.type === TYPES.MUD) { 
                    ctx.fillStyle = '#5d4037'; ctx.fillRect(plt.x, plt.y, plt.width, plt.height);
                    ctx.fillStyle = '#3e2723'; ctx.fillRect(plt.x, plt.y, plt.width, 4); 
                }

                if (plt.item === ITEMS.POTION) { ctx.font = '16px Arial'; ctx.fillText('❤️', plt.x + plt.width/2 - 8, plt.y - 2); } 
                else if (plt.item === ITEMS.POISON) { ctx.font = '16px Arial'; ctx.fillText('☠️', plt.x + plt.width/2 - 8, plt.y - 2); }
            });

            if (currentMode !== 'single') drawCharacter(p2);
            drawCharacter(p1);
            
            if (gameState === STATE_GAMEOVER) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center';
                ctx.fillText('遊戲結束', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '20px Arial'; ctx.fillText(`最終抵達：地下 ${floorCount} 層`, canvas.width / 2, canvas.height / 2 + 30);
                if (currentMode !== 'online_client') {
                    ctx.fillStyle = '#f1c40f'; ctx.fillText('按空白鍵或【重來】', canvas.width / 2, canvas.height / 2 + 80);
                } else {
                    ctx.fillStyle = '#bdc3c7'; ctx.fillText('等待房主重新開始...', canvas.width / 2, canvas.height / 2 + 80);
                }
                ctx.textAlign = 'left'; 
            }
        }
        
        draw();
    </script>
</body>
</html>
